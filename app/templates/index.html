{% extends 'base.html' %}
{% block content %}
<h2>Students</h2>
<a href="/create" class="btn btn-primary mb-3">Add Student</a>

<table class="table table-bordered">
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Course</th>
    <th>Actions</th>
</tr>

{% for student in students %}
<tr>
    <td>{{ student.name }}</td>
    <td>{{ student.email }}</td>
    <td>{{ student.course }}</td>
    <td>
        <a href="/edit/{{ student.id }}" class="btn btn-warning">Edit</a>
        <a href="/delete/{{ student.id }}" class="btn btn-danger">Delete</a>
    </td>
</tr>
{% endfor %}
</table>
{% endblock %}
